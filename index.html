<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mileage Log">
<title>Mileage Log</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1220;
    --surface: #111d30;
    --card: #162238;
    --border: #1e3050;
    --accent: #1a8cff;
    --accent2: #00d4aa;
    --warn: #ff6b35;
    --text: #e8f0fe;
    --muted: #6b8ab0;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --radius: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(26,140,255,.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(0,212,170,.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 calc(80px + var(--safe-bottom)); }

  /* ── Header ── */
  header {
    padding: 20px 20px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .header-left h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -.5px;
    line-height: 1.1;
  }
  .header-left p {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .year-badge {
    background: var(--accent);
    color: #fff;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    margin-top: 4px;
  }

  /* ── Stats bar ── */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 16px 20px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 10px;
    text-align: center;
  }
  .stat-card .val {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-card .val.green { color: var(--accent2); }
  .stat-card .lbl {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-top: 4px;
  }

  /* ── Tab nav ── */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 0 20px 14px;
  }
  .tab {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    padding: 9px 6px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .18s;
    text-align: center;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Views ── */
  .view { display: none; padding: 0 20px; }
  .view.active { display: block; }

  /* ── Add trip form ── */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
  }
  .field input, .field select, .field textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 8px;
    outline: none;
    transition: border-color .15s;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field textarea { resize: none; height: 64px; }
  .field select option { background: var(--surface); }

  .miles-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
  .miles-hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent2);
    padding-bottom: 11px;
    white-space: nowrap;
  }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    width: 100%;
  }
  .btn-add:active { opacity: .85; transform: scale(.98); }

  /* ── Trip list ── */
  .trip-list { display: flex; flex-direction: column; gap: 10px; }

  .trip-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: start;
    animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

  .trip-meta { display: flex; flex-direction: column; gap: 3px; }
  .trip-purpose {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .trip-route {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .trip-date {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
  }
  .trip-right { text-align: right; }
  .trip-miles {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }
  .trip-deduction {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent2);
    margin-top: 2px;
  }
  .trip-actions { display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end; }
  .btn-del {
    background: rgba(255,107,53,.1);
    border: 1px solid rgba(255,107,53,.25);
    color: var(--warn);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-display);
  }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; line-height: 1.5; }

  /* ── Log/Export view ── */
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .section-head h2 { font-size: 16px; font-weight: 800; }
  .btn-export {
    background: var(--accent2);
    color: #0b1220;
    border: none;
    border-radius: 8px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    padding: 8px 14px;
    cursor: pointer;
  }
  .btn-clear {
    background: rgba(255,107,53,.1);
    border: 1px solid rgba(255,107,53,.3);
    color: var(--warn);
    border-radius: 8px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    padding: 8px 14px;
    cursor: pointer;
  }

  .rate-note {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .rate-note strong { color: var(--text); }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(11,18,32,.92);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 calc(10px + var(--safe-bottom));
    z-index: 100;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 20px;
    transition: color .15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* ── Filter row ── */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
    white-space: nowrap;
    cursor: pointer;
    font-family: var(--font-display);
  }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--accent2);
    color: #0b1220;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 999;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="header-left">
      <h1>Mileage Log</h1>
      <p>Manual · Tax-ready · Private</p>
    </div>
    <div class="year-badge" id="yearBadge">2025</div>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="val" id="statTrips">0</div>
      <div class="lbl">Trips</div>
    </div>
    <div class="stat-card">
      <div class="val" id="statMiles">0</div>
      <div class="lbl">Miles</div>
    </div>
    <div class="stat-card">
      <div class="val green" id="statDeduction">$0</div>
      <div class="lbl">Deduction</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">+ Add Trip</button>
    <button class="tab" onclick="switchTab('log')">Trip Log</button>
    <button class="tab" onclick="switchTab('export')">Export</button>
  </div>

  <!-- ADD TRIP -->
  <div class="view active" id="view-add">
    <div class="form-card">
      <div class="form-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="fDate">
        </div>
        <div class="field">
          <label>Category</label>
          <select id="fCategory">
            <option value="Client Meeting">Client Meeting</option>
            <option value="Photography Job">Photography Job</option>
            <option value="Networking">Networking</option>
            <option value="Supply Run">Supply Run</option>
            <option value="Bank / Finance">Bank / Finance</option>
            <option value="Other Business">Other Business</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Business Purpose</label>
        <input type="text" id="fPurpose" placeholder="e.g. Photo shoot at Port Clinton Marina">
      </div>
      <div class="form-row">
        <div class="field">
          <label>From</label>
          <input type="text" id="fFrom" placeholder="Oak Harbor, OH">
        </div>
        <div class="field">
          <label>To</label>
          <input type="text" id="fTo" placeholder="Sandusky, OH">
        </div>
      </div>
      <div class="miles-row">
        <div class="field" style="flex:1">
          <label>Miles (round trip?)</label>
          <input type="number" id="fMiles" placeholder="0" min="0" step="0.1" inputmode="decimal">
        </div>
        <div class="miles-hint" id="milesHint">= $0.00</div>
      </div>
      <button class="btn-add" onclick="addTrip()">Log This Trip</button>
    </div>
  </div>

  <!-- TRIP LOG -->
  <div class="view" id="view-log">
    <div class="section-head">
      <h2>All Trips</h2>
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div class="trip-list" id="tripList"></div>
  </div>

  <!-- EXPORT -->
  <div class="view" id="view-export">
    <div class="rate-note">
      <strong>2025 IRS Standard Mileage Rate: $0.70/mile</strong><br>
      Keep this log plus receipts for fuel, maintenance, and tolls as backup documentation.
    </div>
    <div class="section-head">
      <h2>Export Summary</h2>
      <button class="btn-export" onclick="exportCSV()">Download CSV</button>
    </div>
    <div id="exportPreview"></div>
  </div>
</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-add" onclick="switchTab('add')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    Add
  </button>
  <button class="nav-btn" id="nav-log" onclick="switchTab('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
    </svg>
    Log
  </button>
  <button class="nav-btn" id="nav-export" onclick="switchTab('export')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Export
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
  const IRS_RATE = 0.70;
  let trips = JSON.parse(localStorage.getItem('bbm_trips') || '[]');
  let filterCat = 'All';

  // Set today's date as default
  document.getElementById('fDate').valueAsDate = new Date();
  document.getElementById('yearBadge').textContent = new Date().getFullYear();

  // Live deduction preview
  document.getElementById('fMiles').addEventListener('input', e => {
    const m = parseFloat(e.target.value) || 0;
    document.getElementById('milesHint').textContent = `= $${(m * IRS_RATE).toFixed(2)}`;
  });

  function save() {
    localStorage.setItem('bbm_trips', JSON.stringify(trips));
    updateStats();
    renderLog();
    renderExport();
  }

  function updateStats() {
    const filtered = trips;
    const totalMiles = filtered.reduce((s, t) => s + t.miles, 0);
    const totalDed = totalMiles * IRS_RATE;
    document.getElementById('statTrips').textContent = filtered.length;
    document.getElementById('statMiles').textContent = totalMiles.toFixed(1);
    document.getElementById('statDeduction').textContent = '$' + totalDed.toFixed(0);
  }

  function addTrip() {
    const date = document.getElementById('fDate').value;
    const category = document.getElementById('fCategory').value;
    const purpose = document.getElementById('fPurpose').value.trim();
    const from = document.getElementById('fFrom').value.trim();
    const to = document.getElementById('fTo').value.trim();
    const miles = parseFloat(document.getElementById('fMiles').value);

    if (!date || !purpose || !miles || miles <= 0) {
      showToast('Please fill in date, purpose & miles');
      return;
    }

    trips.unshift({ id: Date.now(), date, category, purpose, from, to, miles });
    save();

    // Reset form
    document.getElementById('fPurpose').value = '';
    document.getElementById('fFrom').value = '';
    document.getElementById('fTo').value = '';
    document.getElementById('fMiles').value = '';
    document.getElementById('milesHint').textContent = '= $0.00';
    document.getElementById('fDate').valueAsDate = new Date();

    showToast('Trip logged ✓');
  }

  function deleteTrip(id) {
    trips = trips.filter(t => t.id !== id);
    save();
  }

  function clearAll() {
    if (!confirm('Delete ALL trips? This cannot be undone.')) return;
    trips = [];
    save();
    showToast('All trips cleared');
  }

  function renderLog() {
    const list = document.getElementById('tripList');
    const filterRow = document.getElementById('filterRow');

    // Build category filters
    const cats = ['All', ...new Set(trips.map(t => t.category))];
    filterRow.innerHTML = cats.map(c =>
      `<button class="filter-chip ${c === filterCat ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
    ).join('');

    const visible = filterCat === 'All' ? trips : trips.filter(t => t.category === filterCat);

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">🚗</div><p>No trips logged yet.<br>Tap "+ Add Trip" to get started.</p></div>`;
      return;
    }

    list.innerHTML = visible.map(t => `
      <div class="trip-item" id="trip-${t.id}">
        <div class="trip-meta">
          <div class="trip-purpose">${t.purpose}</div>
          ${t.from || t.to ? `<div class="trip-route">${t.from || '—'} → ${t.to || '—'}</div>` : ''}
          <div class="trip-date">${formatDate(t.date)} · ${t.category}</div>
        </div>
        <div class="trip-right">
          <div class="trip-miles">${t.miles} mi</div>
          <div class="trip-deduction">$${(t.miles * IRS_RATE).toFixed(2)}</div>
          <div class="trip-actions">
            <button class="btn-del" onclick="deleteTrip(${t.id})">Delete</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function setFilter(cat) {
    filterCat = cat;
    renderLog();
  }

  function renderExport() {
    const preview = document.getElementById('exportPreview');
    if (trips.length === 0) {
      preview.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>No trips to export yet.</p></div>`;
      return;
    }

    const byMonth = {};
    trips.forEach(t => {
      const m = t.date.substring(0, 7);
      if (!byMonth[m]) byMonth[m] = { miles: 0, count: 0 };
      byMonth[m].miles += t.miles;
      byMonth[m].count++;
    });

    const totalMiles = trips.reduce((s, t) => s + t.miles, 0);
    const totalDed = totalMiles * IRS_RATE;

    preview.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead>
            <tr style="background:var(--surface);">
              <th style="padding:10px 12px;text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;">Month</th>
              <th style="padding:10px 12px;text-align:right;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;">Trips</th>
              <th style="padding:10px 12px;text-align:right;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;">Miles</th>
              <th style="padding:10px 12px;text-align:right;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;">Deduction</th>
            </tr>
          </thead>
          <tbody>
            ${Object.entries(byMonth).sort().reverse().map(([m, d]) => `
              <tr style="border-top:1px solid var(--border);">
                <td style="padding:10px 12px;font-family:var(--font-mono);font-size:11px;">${formatMonth(m)}</td>
                <td style="padding:10px 12px;text-align:right;color:var(--muted);">${d.count}</td>
                <td style="padding:10px 12px;text-align:right;font-family:var(--font-mono);color:var(--accent);">${d.miles.toFixed(1)}</td>
                <td style="padding:10px 12px;text-align:right;font-family:var(--font-mono);color:var(--accent2);">$${(d.miles * IRS_RATE).toFixed(2)}</td>
              </tr>
            `).join('')}
          </tbody>
          <tfoot>
            <tr style="border-top:2px solid var(--accent);background:var(--surface);">
              <td style="padding:10px 12px;font-weight:700;">TOTAL</td>
              <td style="padding:10px 12px;text-align:right;font-weight:700;">${trips.length}</td>
              <td style="padding:10px 12px;text-align:right;font-family:var(--font-mono);font-weight:700;color:var(--accent);">${totalMiles.toFixed(1)}</td>
              <td style="padding:10px 12px;text-align:right;font-family:var(--font-mono);font-weight:700;color:var(--accent2);">$${totalDed.toFixed(2)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
      <p style="font-size:11px;color:var(--muted);text-align:center;">Rate: $${IRS_RATE}/mile · ${trips.length} trips · ${totalMiles.toFixed(1)} total miles</p>
    `;
  }

  function exportCSV() {
    const rows = [
      ['Date', 'Category', 'Business Purpose', 'From', 'To', 'Miles', 'Deduction ($)'],
      ...trips.map(t => [
        t.date, t.category, t.purpose, t.from || '', t.to || '',
        t.miles.toFixed(1), (t.miles * IRS_RATE).toFixed(2)
      ])
    ];
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mileage-log-${new Date().getFullYear()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV downloaded!');
  }

  function switchTab(tab) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`view-${tab}`).classList.add('active');
    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById(`nav-${tab}`).classList.add('active');
  }

  function formatDate(d) {
    const [y, m, day] = d.split('-');
    return `${m}/${day}/${y}`;
  }

  function formatMonth(m) {
    const [y, mo] = m.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(mo)-1]} ${y}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // Init
  updateStats();
  renderLog();
  renderExport();
</script>
</body>
</html>
